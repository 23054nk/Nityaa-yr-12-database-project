<html>
<head>
    <title>chooseGame.html</title>

</head>
<body>

<div class="chooseGameContainer">
    <h1>Choose what game you want to play!</h1>

    <div class="game-links">

        <button onclick="window.location.href='jurassic-chase/index.html'">
            Play Jurassic Chase
        </button>

        <button onclick="window.location.href='geo-dash/index.html'">
            Play Geo Dash
        </button>
        
    </div>

<br>
<br>
<br>
        <!-- reviews page-->
<!-- Reviews -->
<div class="card">

    <h2>Leave a Review</h2>

    <p>Tell us what you thought about the game you just played!</p>

    <textarea
        id="review"
        placeholder="Write your review here..."
        rows="5"
    ></textarea>

    <br><br>

    <button onclick="saveReview()">Submit Review</button>

    <br><br>

    <div id="reviews"></div>

</div>

    <button onclick="window.location.href='highScoresPage.html'">
            See highscores
    </button>
</div>
  
</body>
</html>
