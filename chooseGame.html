<script>

// saving the user's review to 
function saveReview() {

    const review = document.getElementById("review").value;

    if (review.trim() === "") {
        alert("Please write a review first.");
        return;
    }

    firebase.database().ref("reviews").push({

        name: localStorage.getItem("gameName"),
        review: review

    });

    alert("Review submitted!");

    document.getElementById("review").value = "";
}
</script>

<script>
// to display the reviews on the page
firebase.database().ref("reviews").on("value", function(snapshot) {

    document.getElementById("reviews").innerHTML = "";

    snapshot.forEach(function(childSnapshot) {

        let data = childSnapshot.val();

        document.getElementById("reviews").innerHTML +=
            "<p><b>" + data.name + ":</b> " + data.review + "</p>";

    });

});
</script>
