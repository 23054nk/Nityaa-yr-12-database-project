</head>


<body>
    <h1>Highscores</h1>
    <h2>Jurassic Chase</h2>
    <div id="jurassicScores"></div>

    <script>

    firebase.database().ref("JurrasicChase").once("value", function(snapshot){

    snapshot.forEach(function(childSnapshot){

        let gameName = childSnapshot.key;
        let score = childSnapshot.val().Score;

        document.getElementById("jurassicScores").innerHTML +=
            "<p>" + gameName + " got " + score + " points.</p>";

    });

    });
    </script>

    <h2>Geo Dash</h2>

<div id="geoScores"></div>

<script>

firebase.database().ref("GeoDash").once("value", function(snapshot){

    snapshot.forEach(function(childSnapshot){

        let gameName = childSnapshot.key;
        let score = childSnapshot.val().Score;

        document.getElementById("geoScores").innerHTML +=
            "<p>" + gameName + " got " + score + " points.</p>";

    });

});

</script>
    
</body>
</html>
